name: Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: bash ./test

      - name: Publish coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            cover.out
            cover.report.txt
